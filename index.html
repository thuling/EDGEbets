<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EdgeBets - Dashboard Completo</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Mono', monospace; background: #070b0f; color: #e6edf3; }
    .container { max-width: 1400px; margin: 0 auto; padding: 28px 32px; }
    header { border-bottom: 1px solid #21262d; padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 56px; background: #070b0f; position: sticky; top: 0; z-index: 100; }
    .logo { width: 28px; height: 28px; background: linear-gradient(135deg,#00e5a0,#00c87a); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
    .brand { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 15px; }
    .btn { background: transparent; color: #8b949e; border: 1px solid #30363d; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 12px; font-family: inherit; }
    .btn:hover { border-color: #00e5a0; color: #00e5a0; }
    .btn-danger { color: #ff4757; border-color: #ff475740; }
    .btn-danger:hover { background: #ff475720; border-color: #ff4757; }
    .btn-primary { background: linear-gradient(135deg, #00e5a0, #00c87a); color: #070b0f; border: none; padding: 10px 22px; font-weight: 500; }
    .btn-small { padding: 4px 10px; font-size: 11px; }
    .btn-success { background: #00e5a0; color: #070b0f; border: none; }
    .btn-success:hover { opacity: 0.9; }
    .kpi-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin: 24px 0; }
    .kpi-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin: 24px 0; }
    .kpi { background: #0d1117; border: 1px solid #21262d; border-radius: 10px; padding: 18px 22px; position: relative; overflow: hidden; }
    .kpi::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
    .kpi.green::before { background: linear-gradient(90deg, #00e5a0, transparent); }
    .kpi.red::before { background: linear-gradient(90deg, #ff4757, transparent); }
    .kpi.orange::before { background: linear-gradient(90deg, #ffa502, transparent); }
    .kpi.blue::before { background: linear-gradient(90deg, #7ecbff, transparent); }
    .kpi.purple::before { background: linear-gradient(90deg, #c77dff, transparent); }
    .kpi-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: #8b949e; margin-bottom: 8px; }
    .kpi-value { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; line-height: 1.1; }
    .kpi-sub { font-size: 11px; color: #484f58; margin-top: 6px; }
    .card { background: #0d1117; border: 1px solid #21262d; border-radius: 10px; padding: 22px 24px; margin: 16px 0; }
    .section-title { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: #8b949e; margin-bottom: 4px; }
    h1 { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; }
    h2 { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; color: #00e5a0; margin: 24px 0 16px; }
    h3 { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 600; color: #e6edf3; margin: 16px 0 12px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 10px 14px; color: #8b949e; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; border-bottom: 1px solid #21262d; font-weight: 400; }
    td { padding: 11px 14px; border-bottom: 1px solid #161b22; }
    tr:hover td { background: rgba(255,255,255,0.02); }
    .badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 500; }
    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: #8b949e; }
    .form-input { background: #161b22; border: 1px solid #30363d; color: #e6edf3; padding: 9px 12px; border-radius: 6px; font-family: inherit; font-size: 13px; width: 100%; }
    .form-input:focus { outline: none; border-color: #00e5a0; box-shadow: 0 0 0 2px rgba(0,229,160,0.12); }
    .form-input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
    .form-input[type="file"] { padding: 6px; font-size: 12px; }
    textarea.form-input { resize: vertical; min-height: 70px; font-family: inherit; line-height: 1.5; }
    select.form-input { cursor: pointer; }
    .form-hint { font-size: 11px; color: #8b949e; margin-top: 4px; font-style: italic; }
    .nav { display: flex; gap: 4px; }
    .nav-item { background: none; border: none; cursor: pointer; font-family: inherit; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; padding: 6px 14px; border-radius: 4px; color: #8b949e; }
    .nav-item:hover { color: #e6edf3; }
    .nav-item.active { background: rgba(0,229,160,0.12); color: #00e5a0; }
    .save-indicator { position: fixed; top: 20px; right: 20px; background: #0d1117; border: 1px solid #21262d; padding: 8px 16px; border-radius: 6px; font-size: 12px; color: #00e5a0; z-index: 1000; }
    .filters { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin: 20px 0; }
    .filter-item { display: flex; align-items: center; gap: 6px; }
    .filter-label { font-size: 11px; color: #484f58; text-transform: uppercase; letter-spacing: 0.08em; }
    .tag-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .tag { background: #161b22; border: 1px solid #30363d; padding: 6px 12px; border-radius: 6px; font-size: 12px; display: flex; align-items: center; gap: 8px; }
    .tag-remove { color: #ff4757; cursor: pointer; font-weight: bold; }
    .tag-remove:hover { color: #ff6b7a; }
    .input-group { display: flex; gap: 8px; align-items: flex-end; }
    .alert { background: #ffa50215; border: 1px solid #ffa50240; border-radius: 8px; padding: 12px 16px; margin: 16px 0; font-size: 13px; color: #ffa502; }
    .alert-success { background: #00e5a015; border-color: #00e5a040; color: #00e5a0; }
    .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .bet-description { font-size: 12px; color: #7ecbff; font-style: italic; max-width: 300px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .heatmap { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-top: 16px; }
    .heatmap-cell { aspect-ratio: 1; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 500; border: 1px solid #21262d; position: relative; cursor: pointer; }
    .heatmap-cell:hover::after { content: attr(data-tooltip); position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: #0d1117; border: 1px solid #30363d; padding: 4px 8px; border-radius: 4px; white-space: nowrap; font-size: 11px; margin-bottom: 4px; z-index: 10; }
    .stat-bar { height: 6px; background: #161b22; border-radius: 3px; overflow: hidden; margin-top: 8px; }
    .stat-bar-fill { height: 100%; background: linear-gradient(90deg, #00e5a0, #00c87a); transition: width 0.3s; }
    .insights-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin: 24px 0; }
    @media (max-width: 768px) {
      .settings-grid { grid-template-columns: 1fr; }
      .kpi-grid { grid-template-columns: repeat(2, 1fr); }
      .kpi-grid-3 { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: 1fr; }
      .insights-grid { grid-template-columns: 1fr; }
      .heatmap { grid-template-columns: repeat(7, 1fr); gap: 2px; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <input type="file" id="file-input" accept=".json" style="display: none">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
const DEFAULT_SETTINGS = {
  initialBank: 1000,
  unitValue: 100,
  sports: ["Futebol", "Basquete", "Tênis", "E-sports", "MMA", "Outro"],
  houses: ["Pinnacle", "Bet365", "Betano", "Sportingbet", "KTO", "Outra"],
  modalidades: ["Simples", "Múltipla", "Criar Aposta"],
  statuses: ["Pendente", "Ganha", "Perdida", "Reembolsada", "Meio-ganha", "Meio-perdida", "Cashout"]
};

const STATUS_COLORS = {
  Ganha: "#00e5a0", Perdida: "#ff4757", Pendente: "#ffa502",
  Reembolsada: "#7ecbff", "Meio-ganha": "#a8ff78", "Meio-perdida": "#ff9f43",
  Cashout: "#c77dff"
};

let state = {
  bets: [],
  settings: {...DEFAULT_SETTINGS},
  view: 'nova',
  filterSport: 'Todos',
  filterHouse: 'Todos',
  filterStatus: 'Todos',
  saveStatus: '',
  showResetConfirm: false,
  editId: null,
  form: { date: "", sport: "Futebol", house: "Pinnacle", odd: "", stake: "", modalidade: "Simples", status: "Pendente", resultado: "", descricao: "" },
  settingsForm: { initialBank: "", unitValue: "", newSport: "", newHouse: "", newModalidade: "" }
};

function loadFromStorage() {
  try {
    const saved = localStorage.getItem('edgebets-v4');
    if (saved) {
      const data = JSON.parse(saved);
      state.bets = data.bets || [];
      if (data.settings) state.settings = data.settings;
    }
  } catch (e) { console.log('Starting fresh'); }
}

function saveToStorage() {
  try {
    localStorage.setItem('edgebets-v4', JSON.stringify({ bets: state.bets, settings: state.settings }));
    return true;
  } catch (e) { console.error('Save error:', e); return false; }
}

function exportData() {
  const data = {
    bets: state.bets,
    settings: state.settings,
    exportDate: new Date().toISOString(),
    version: 'v4'
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `edgebets-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showSaveStatus('✓ Backup baixado!');
}

function importData() {
  document.getElementById('file-input').click();
}

function handleFileImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = (event) => {
    try {
      const imported = JSON.parse(event.target.result);
      if (imported.bets && imported.settings) {
        if (confirm(`Importar ${imported.bets.length} apostas? (Isso VAI SUBSTITUIR seus dados atuais)`)) {
          state.bets = imported.bets;
          state.settings = imported.settings;
          saveToStorage();
          showSaveStatus('✓ Dados importados!');
        }
      } else {
        alert('❌ Arquivo inválido');
      }
    } catch (err) {
      alert('❌ Erro ao ler arquivo: ' + err.message);
    }
  };
  reader.readAsText(file);
}

document.getElementById('file-input').addEventListener('change', handleFileImport);

function showSaveStatus(msg) {
  state.saveStatus = msg;
  render();
  setTimeout(() => { state.saveStatus = ''; render(); }, 1500);
}

function calcMetrics(bets) {
  const closed = bets.filter(b => b.status !== "Pendente" && b.resultado !== null);
  const totalStake = closed.reduce((s, b) => s + b.stake, 0);
  const totalResult = closed.reduce((s, b) => s + (b.resultado || 0), 0);
  const wins = closed.filter(b => b.status === "Ganha" || b.status === "Meio-ganha");
  const losses = closed.filter(b => b.resultado < 0);
  const winRate = closed.length ? (wins.length / closed.length) * 100 : 0;
  const roi = totalStake ? (totalResult / totalStake) * 100 : 0;
  const yield_ = bets.length ? (totalResult / (bets.reduce((s, b) => s + b.stake, 0))) * 100 : 0;
  const unitsWon = totalResult / state.settings.unitValue;
  const avgOddWins = wins.length ? wins.reduce((s, b) => s + b.odd, 0) / wins.length : 0;
  const avgOddLosses = losses.length ? losses.reduce((s, b) => s + b.odd, 0) / losses.length : 0;
  const avgOddTotal = closed.length ? closed.reduce((s, b) => s + b.odd, 0) / closed.length : 0;

  const sorted = [...closed].sort((a, b) => a.date.localeCompare(b.date));
  let greenStreak = 0, redStreak = 0, curGreen = 0, curRed = 0;
  sorted.forEach(b => {
    if (b.resultado > 0) { curGreen++; curRed = 0; } else { curRed++; curGreen = 0; }
    greenStreak = Math.max(greenStreak, curGreen);
    redStreak = Math.max(redStreak, curRed);
  });

  let equity = state.settings.initialBank, peak = state.settings.initialBank, maxDD = 0;
  sorted.forEach(b => {
    equity += b.resultado;
    if (equity > peak) peak = equity;
    const dd = ((peak - equity) / peak) * 100;
    if (dd > maxDD) maxDD = dd;
  });

  const bySport = {}, byHouse = {}, byModalidade = {};
  closed.forEach(b => {
    if (!bySport[b.sport]) bySport[b.sport] = { sport: b.sport, profit: 0, bets: 0, wins: 0, totalOdds: 0 };
    bySport[b.sport].profit += b.resultado;
    bySport[b.sport].bets++;
    bySport[b.sport].totalOdds += b.odd;
    if (b.resultado > 0) bySport[b.sport].wins++;

    if (!byHouse[b.house]) byHouse[b.house] = { house: b.house, profit: 0, bets: 0, wins: 0 };
    byHouse[b.house].profit += b.resultado;
    byHouse[b.house].bets++;
    if (b.resultado > 0) byHouse[b.house].wins++;

    if (!byModalidade[b.modalidade]) byModalidade[b.modalidade] = { modalidade: b.modalidade, profit: 0, bets: 0, wins: 0 };
    byModalidade[b.modalidade].profit += b.resultado;
    byModalidade[b.modalidade].bets++;
    if (b.resultado > 0) byModalidade[b.modalidade].wins++;
  });

  const sportData = Object.values(bySport).map(s => ({
    ...s, winRate: s.bets ? ((s.wins / s.bets) * 100) : 0, avgOdd: s.bets ? (s.totalOdds / s.bets) : 0
  })).sort((a, b) => b.profit - a.profit);

  const houseData = Object.values(byHouse).map(h => ({
    ...h, winRate: h.bets ? ((h.wins / h.bets) * 100) : 0
  })).sort((a, b) => b.profit - a.profit);

  const modalidadeData = Object.values(byModalidade).map(m => ({
    ...m, winRate: m.bets ? ((m.wins / m.bets) * 100) : 0
  }));

  const oddRanges = [
    { range: "1.0 - 1.5", min: 1.0, max: 1.5, bets: 0, wins: 0, profit: 0 },
    { range: "1.5 - 2.0", min: 1.5, max: 2.0, bets: 0, wins: 0, profit: 0 },
    { range: "2.0 - 3.0", min: 2.0, max: 3.0, bets: 0, wins: 0, profit: 0 },
    { range: "3.0+", min: 3.0, max: 999, bets: 0, wins: 0, profit: 0 }
  ];
  closed.forEach(b => {
    const range = oddRanges.find(r => b.odd >= r.min && b.odd < r.max);
    if (range) {
      range.bets++;
      if (b.resultado > 0) range.wins++;
      range.profit += b.resultado;
    }
  });
  oddRanges.forEach(r => { r.winRate = r.bets ? ((r.wins / r.bets) * 100) : 0; });

  const monthly = {};
  closed.forEach(b => {
    const m = b.date.slice(0, 7);
    if (!monthly[m]) monthly[m] = { month: m, profit: 0, loss: 0, net: 0, bets: 0, wins: 0 };
    if (b.resultado > 0) { monthly[m].profit += b.resultado; monthly[m].wins++; } 
    else { monthly[m].loss += b.resultado; }
    monthly[m].net += b.resultado;
    monthly[m].bets++;
  });
  const monthlyData = Object.values(monthly).map(m => ({
    ...m, winRate: m.bets ? ((m.wins / m.bets) * 100) : 0, units: m.net / state.settings.unitValue
  })).sort((a, b) => a.month.localeCompare(b.month));

  const today = new Date();
  const heatmapData = [];
  for (let i = 89; i >= 0; i--) {
    const date = new Date(today);
    date.setDate(date.getDate() - i);
    const dateStr = date.toISOString().slice(0, 10);
    const dayBets = closed.filter(b => b.date === dateStr);
    const dayProfit = dayBets.reduce((s, b) => s + b.resultado, 0);
    heatmapData.push({ date: dateStr, day: date.getDate(), profit: dayProfit, bets: dayBets.length });
  }

  return { totalResult, totalStake, roi, yield: yield_, winRate, maxDD: maxDD.toFixed(1), greenStreak, redStreak,
    sportData, houseData, modalidadeData, oddRanges, monthlyData, heatmapData,
    totalBets: bets.length, closedBets: closed.length, unitsWon, avgOddWins, avgOddLosses, avgOddTotal };
}

function handleSubmit(e) {
  e.preventDefault();
  const odd = parseFloat(state.form.odd);
  const stake = parseFloat(state.form.stake);
  
  if (!state.form.date || !odd || !stake) { alert('Preencha: Data, Odd e Stake'); return; }

  let resultado = null;
  if (state.form.status === "Ganha") resultado = parseFloat(((odd - 1) * stake).toFixed(2));
  else if (state.form.status === "Perdida") resultado = -stake;
  else if (state.form.status === "Reembolsada") resultado = 0;
  else if (state.form.status === "Meio-ganha") resultado = parseFloat(((odd - 1) * stake / 2).toFixed(2));
  else if (state.form.status === "Meio-perdida") resultado = -stake / 2;
  else if (state.form.status === "Cashout") {
    if (!state.form.resultado) { alert('Para Cashout, informe o valor recebido'); return; }
    resultado = parseFloat(state.form.resultado) - stake;
  } else if (state.form.resultado) resultado = parseFloat(state.form.resultado);

  if (state.editId) {
    state.bets = state.bets.map(b => b.id === state.editId ? { ...state.form, id: state.editId, stake, odd, resultado } : b);
    state.editId = null;
  } else {
    state.bets.push({ ...state.form, id: Date.now(), stake, odd, resultado });
  }

  state.form = { date: "", sport: state.settings.sports[0], house: state.settings.houses[0], odd: "", stake: "", modalidade: state.settings.modalidades[0], status: "Pendente", resultado: "", descricao: "" };
  state.view = 'apostas';
  saveToStorage();
  showSaveStatus('✓ Aposta salva');
}

function handleEdit(bet) {
  state.form = { ...bet, odd: String(bet.odd), stake: String(bet.stake), resultado: String(bet.resultado ?? ""), descricao: bet.descricao || "" };
  state.editId = bet.id;
  state.view = 'nova';
  render();
}

function handleDelete(id) {
  if (confirm('Excluir esta aposta?')) {
    state.bets = state.bets.filter(b => b.id !== id);
    saveToStorage();
    showSaveStatus('✓ Excluída');
  }
}

function handleReset() {
  if (!state.showResetConfirm) { state.showResetConfirm = true; render(); return; }
  localStorage.removeItem('edgebets-v4');
  state.bets = [];
  state.showResetConfirm = false;
  saveToStorage();
  showSaveStatus('✓ Tudo apagado');
}

function updateInitialBank() {
  const value = parseFloat(state.settingsForm.initialBank);
  if (value && value > 0) {
    state.settings.initialBank = value;
    state.settingsForm.initialBank = "";
    saveToStorage();
    showSaveStatus('✓ Banca atualizada');
  } else { alert('Valor inválido'); }
}

function updateUnitValue() {
  const value = parseFloat(state.settingsForm.unitValue);
  if (value && value > 0) {
    state.settings.unitValue = value;
    state.settingsForm.unitValue = "";
    saveToStorage();
    showSaveStatus('✓ Unidade atualizada');
  } else { alert('Valor inválido'); }
}

function addSport() {
  const sport = state.settingsForm.newSport.trim();
  if (sport && !state.settings.sports.includes(sport)) {
    state.settings.sports.push(sport);
    state.settingsForm.newSport = "";
    saveToStorage();
    showSaveStatus('✓ Esporte adicionado');
  }
}

function removeSport(sport) {
  if (state.settings.sports.length <= 1) { alert('Mínimo 1 esporte'); return; }
  if (confirm(`Remover "${sport}"?`)) {
    state.settings.sports = state.settings.sports.filter(s => s !== sport);
    saveToStorage();
    showSaveStatus('✓ Removido');
  }
}

function addHouse() {
  const house = state.settingsForm.newHouse.trim();
  if (house && !state.settings.houses.includes(house)) {
    state.settings.houses.push(house);
    state.settingsForm.newHouse = "";
    saveToStorage();
    showSaveStatus('✓ Casa adicionada');
  }
}

function removeHouse(house) {
  if (state.settings.houses.length <= 1) { alert('Mínimo 1 casa'); return; }
  if (confirm(`Remover "${house}"?`)) {
    state.settings.houses = state.settings.houses.filter(h => h !== house);
    saveToStorage();
    showSaveStatus('✓ Removida');
  }
}

function addModalidade() {
  const modalidade = state.settingsForm.newModalidade.trim();
  if (modalidade && !state.settings.modalidades.includes(modalidade)) {
    state.settings.modalidades.push(modalidade);
    state.settingsForm.newModalidade = "";
    saveToStorage();
    showSaveStatus('✓ Modalidade adicionada');
  }
}

function removeModalidade(modalidade) {
  if (state.settings.modalidades.length <= 1) { alert('Mínimo 1 modalidade'); return; }
  if (confirm(`Remover "${modalidade}"?`)) {
    state.settings.modalidades = state.settings.modalidades.filter(m => m !== modalidade);
    saveToStorage();
    showSaveStatus('✓ Removida');
  }
}

function handleResetSettings() {
  if (confirm('Resetar configurações?')) {
    localStorage.removeItem('edgebets-settings-v3');
    state.settings = {...DEFAULT_SETTINGS};
    saveToStorage();
    showSaveStatus('✓ Configurações resetadas');
  }
}

function getHeatmapColor(profit) {
  if (profit > 100) return '#00e5a0';
  if (profit > 50) return '#48bb78';
  if (profit > 0) return '#68d391';
  if (profit === 0) return '#161b22';
  if (profit > -50) return '#fc8181';
  if (profit > -100) return '#f56565';
  return '#ff4757';
}

function render() {
  const metrics = calcMetrics(state.bets);
  const filteredBets = state.bets.filter(b =>
    (state.filterSport === 'Todos' || b.sport === state.filterSport) &&

    (state.filterStatus === 'Todos' || b.status === state.filterStatus)
  );

  const app = document.getElementById('app');
  app.innerHTML = `
    ${state.saveStatus ? `<div class="save-indicator">${state.saveStatus}</div>` : ''}
    
    <header>
      <div style="display: flex; align-items: center; gap: 16px;">
        <div class="logo">◈</div>
        <span class="brand">EDGEBETS</span>
        <span style="color: #30363d; font-size: 18px; margin: 0 4px;">|</span>
        <nav class="nav">
          <button class="nav-item ${state.view === 'dashboard' ? 'active' : ''}" onclick="state.view='dashboard'; render()">Dashboard</button>
          <button class="nav-item ${state.view === 'insights' ? 'active' : ''}" onclick="state.view='insights'; render()">📊 Insights</button>
          <button class="nav-item ${state.view === 'apostas' ? 'active' : ''}" onclick="state.view='apostas'; render()">Apostas</button>
          <button class="nav-item ${state.view === 'nova' ? 'active' : ''}" onclick="state.view='nova'; render()">Nova</button>
          <button class="nav-item ${state.view === 'config' ? 'active' : ''}" onclick="state.view='config'; render()">⚙ Config</button>
        </nav>
      </div>
      <div style="display: flex; gap: 10px; align-items: center;">
        <button class="btn btn-success btn-small" onclick="exportData()" title="Backup">💾 Backup</button>
        <button class="btn btn-small" onclick="importData()" title="Restaurar">📂 Restaurar</button>
        <span style="font-size: 12px; color: #8b949e;">Banca: <strong style="color: #00e5a0;">R$ ${(state.settings.initialBank + metrics.totalResult).toFixed(2)}</strong></span>
        <button class="btn ${state.showResetConfirm ? 'btn-danger' : ''}" onclick="handleReset()">
          ${state.showResetConfirm ? 'Confirmar?' : '↻'}
        </button>
        ${state.showResetConfirm ? '<button class="btn" onclick="state.showResetConfirm=false; render()">✕</button>' : ''}
      </div>
    </header>

    <div class="container">
      ${state.view === 'dashboard' ? renderDashboard(metrics) : ''}
      ${state.view === 'insights' ? renderInsights(metrics) : ''}
      ${state.view === 'apostas' ? renderApostas(filteredBets) : ''}
      ${state.view === 'nova' ? renderNovaAposta() : ''}
      ${state.view === 'config' ? renderConfig() : ''}
    </div>
  `;
}

function renderDashboard(metrics) {
  if (state.bets.length === 0) {
    return `
      <div style="text-align: center; padding: 80px 20px;">
        <div style="font-size: 64px; margin-bottom: 16px;">📊</div>
        <h1 style="margin-bottom: 12px;">Dashboard Vazio</h1>
        <p style="color: #8b949e; margin-bottom: 32px;">Adicione apostas para ver estatísticas</p>
        <button class="btn btn-primary" onclick="state.view='nova'; render()">+ Primeira Aposta</button>
      </div>
    `;
  }

  return `
    <h1>Dashboard</h1>
    <div class="kpi-grid">
      ${[
        { label: "Units Won/Lost", value: `${metrics.unitsWon >= 0 ? '+' : ''}${metrics.unitsWon.toFixed(2)}U`, sub: `1U = R$ ${state.settings.unitValue}`, cls: metrics.unitsWon >= 0 ? "green" : "red", color: metrics.unitsWon >= 0 ? "#00e5a0" : "#ff4757" },
        { label: "ROI Total", value: `${metrics.roi.toFixed(2)}%`, sub: "Retorno s/ investimento", cls: metrics.roi >= 0 ? "green" : "red", color: metrics.roi >= 0 ? "#00e5a0" : "#ff4757" },
        { label: "Yield", value: `${metrics.yield.toFixed(2)}%`, sub: "Eficiência", cls: metrics.yield >= 0 ? "green" : "red", color: metrics.yield >= 0 ? "#00e5a0" : "#ff4757" },
        { label: "Win Rate", value: `${metrics.winRate.toFixed(1)}%`, sub: "Taxa de acerto", cls: metrics.winRate >= 50 ? "green" : "orange", color: metrics.winRate >= 50 ? "#00e5a0" : "#ffa502" },
        { label: "Max Drawdown", value: `${metrics.maxDD}%`, sub: "Maior queda", cls: "red", color: "#ff4757" },
      ].map(k => `
        <div class="kpi ${k.cls}">
          <p class="kpi-label">${k.label}</p>
          <p class="kpi-value" style="color: ${k.color};">${k.value}</p>
          <p class="kpi-sub">${k.sub}</p>
        </div>
      `).join('')}
    </div>

    <div class="kpi-grid-3">
      ${[
        { label: "Odd Média (Geral)", value: metrics.avgOddTotal.toFixed(2), sub: "Todas apostas", cls: "blue", color: "#7ecbff" },
        { label: "Odd Média (Wins)", value: metrics.avgOddWins.toFixed(2), sub: "Vitórias", cls: "green", color: "#00e5a0" },
        { label: "Odd Média (Losses)", value: metrics.avgOddLosses.toFixed(2), sub: "Derrotas", cls: "red", color: "#ff4757" },
      ].map(k => `
        <div class="kpi ${k.cls}">
          <p class="kpi-label">${k.label}</p>
          <p class="kpi-value" style="color: ${k.color};">${k.value}</p>
          <p class="kpi-sub">${k.sub}</p>
        </div>
      `).join('')}
    </div>

    <div class="insights-grid">
      <div class="card">
        <p class="section-title">🏆 Melhor Esporte</p>
        <h3 style="color: #00e5a0; margin-top: 12px;">${metrics.sportData[0]?.sport || 'N/A'}</h3>
        <p style="font-size: 13px; color: #8b949e; margin-top: 4px;">
          ${metrics.sportData[0]?.profit >= 0 ? '+' : ''}R$ ${metrics.sportData[0]?.profit.toFixed(2) || '0.00'} · 
          ${metrics.sportData[0]?.winRate.toFixed(1) || '0'}% WR · 
          ${metrics.sportData[0]?.bets || 0} apostas
        </p>
      </div>

      <div class="card">
        <p class="section-title">🏠 Melhor Casa</p>
        <h3 style="color: #00e5a0; margin-top: 12px;">${metrics.houseData[0]?.house || 'N/A'}</h3>
        <p style="font-size: 13px; color: #8b949e; margin-top: 4px;">
          ${metrics.houseData[0]?.profit >= 0 ? '+' : ''}R$ ${metrics.houseData[0]?.profit.toFixed(2) || '0.00'} · 
          ${metrics.houseData[0]?.winRate.toFixed(1) || '0'}% WR · 
          ${metrics.houseData[0]?.bets || 0} apostas
        </p>
      </div>
    </div>

    <div class="card">
      <p class="section-title">Performance por Esporte</p>
      <table style="margin-top: 16px;">
        <thead><tr><th>Esporte</th><th>Apostas</th><th>Win Rate</th><th>Odd Média</th><th>P&L</th></tr></thead>
        <tbody>
          ${metrics.sportData.map(s => `
            <tr>
              <td>${s.sport}</td>
              <td style="color: #8b949e;">${s.bets}</td>
              <td><span style="color: ${s.winRate >= 50 ? '#00e5a0' : '#ff4757'};">${s.winRate.toFixed(1)}%</span></td>
              <td style="color: #7ecbff;">${s.avgOdd.toFixed(2)}</td>
              <td style="color: ${s.profit >= 0 ? '#00e5a0' : '#ff4757'}; font-weight: 500;">${s.profit >= 0 ? '+' : ''}R$ ${s.profit.toFixed(2)}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function renderInsights(m){return state.bets.length===0?`<div style="text-align: center; padding: 80px 20px;"><div style="font-size: 64px; margin-bottom: 16px;">📈</div><h1 style="margin-bottom: 12px;">Sem Dados</h1><p style="color: #8b949e; margin-bottom: 32px;">Adicione apostas para ver insights</p><button class="btn btn-primary" onclick="state.view='nova'; render()">+ Primeira Aposta</button></div>`:`<h1>Insights</h1><div class="card"><p class="section-title">🏠 Performance por Casa</p><table style="margin-top: 16px;"><thead><tr><th>Casa</th><th>Apostas</th><th>Win Rate</th><th>P&L</th></tr></thead><tbody>${m.houseData.map(h=>`<tr><td><strong>${h.house}</strong></td><td style="color: #8b949e;">${h.bets}</td><td><span style="color: ${h.winRate>=50?'#00e5a0':'#ff4757'};">${h.winRate.toFixed(1)}%</span></td><td style="color: ${h.profit>=0?'#00e5a0':'#ff4757'}; font-weight: 500;">${h.profit>=0?'+':''}R$ ${h.profit.toFixed(2)}</td></tr>`).join('')}</tbody></table></div><div class="card"><p class="section-title">📋 Performance por Modalidade</p><table style="margin-top: 16px;"><thead><tr><th>Modalidade</th><th>Apostas</th><th>Vitórias</th><th>Win Rate</th><th>P&L</th></tr></thead><tbody>${m.modalidadeData.map(x=>`<tr><td><strong>${x.modalidade}</strong></td><td style="color: #8b949e;">${x.bets}</td><td style="color: #8b949e;">${x.wins}</td><td><span style="color: ${x.winRate>=50?'#00e5a0':'#ff4757'};">${x.winRate.toFixed(1)}%</span></td><td style="color: ${x.profit>=0?'#00e5a0':'#ff4757'}; font-weight: 500;">${x.profit>=0?'+':''}R$ ${x.profit.toFixed(2)}</td></tr>`).join('')}</tbody></table></div><div class="card"><p class="section-title">🎯 Range de Odds</p>${m.oddRanges.map(r=>`<div style="margin-bottom: 20px;"><div style="display: flex; justify-content: space-between; margin-bottom: 4px;"><span style="font-size: 13px; font-weight: 500;">Odds ${r.range}</span><span style="font-size: 12px; color: #8b949e;">${r.bets} apostas · ${r.winRate.toFixed(1)}% WR · ${r.profit>=0?'+':''}R$ ${r.profit.toFixed(2)}</span></div><div class="stat-bar"><div class="stat-bar-fill" style="width: ${r.winRate}%; background: ${r.winRate>=50?'linear-gradient(90deg, #00e5a0, #00c87a)':'linear-gradient(90deg, #ff4757, #ff6b7a)'}"></div></div></div>`).join('')}</div><div class="card"><p class="section-title">📅 Performance Mensal</p><table style="margin-top: 16px;"><thead><tr><th>Mês</th><th>Apostas</th><th>Win Rate</th><th>Units</th><th>P&L</th></tr></thead><tbody>${m.monthlyData.map(x=>`<tr><td><strong>${x.month}</strong></td><td style="color: #8b949e;">${x.bets}</td><td><span style="color: ${x.winRate>=50?'#00e5a0':'#ff4757'};">${x.winRate.toFixed(1)}%</span></td><td style="color: ${x.units>=0?'#00e5a0':'#ff4757'};">${x.units>=0?'+':''}${x.units.toFixed(2)}U</td><td style="color: ${x.net>=0?'#00e5a0':'#ff4757'}; font-weight: 500;">${x.net>=0?'+':''}R$ ${x.net.toFixed(2)}</td></tr>`).join('')}</tbody></table></div><div class="card"><p class="section-title">🔥 Heatmap (Últimos 90 dias)</p><div class="heatmap">${m.heatmapData.map(d=>`<div class="heatmap-cell" style="background: ${getHeatmapColor(d.profit)}; color: ${d.profit===0?'#484f58':'#fff'};" data-tooltip="${d.date}: ${d.bets} apostas · ${d.profit>=0?'+':''}R$ ${d.profit.toFixed(2)}">${d.day}</div>`).join('')}</div></div>`;}
function renderApostas(fb){return`<div style="display: flex; justify-content: space-between; margin-bottom: 20px;"><h1>Apostas</h1><button class="btn btn-primary" onclick="state.view='nova'; state.editId=null; state.form={date:'',sport:state.settings.sports[0],house:state.settings.houses[0],odd:'',stake:'',modalidade:state.settings.modalidades[0],status:'Pendente',resultado:'',descricao:''}; render()">+ Nova</button></div>${state.bets.length>0?`<div class="filters"><div class="filter-item"><span class="filter-label">Esporte</span><select class="form-input" style="width: auto; padding: 6px 10px; font-size: 12px;" onchange="state.filterSport=this.value; render()">${['Todos',...state.settings.sports].map(s=>`<option ${state.filterSport===s?'selected':''}>${s}</option>`).join('')}</select></div><div class="filter-item"><span class="filter-label">Casa</span><select class="form-input" style="width: auto; padding: 6px 10px; font-size: 12px;" onchange="state.filterHouse=this.value; render()">${['Todos',...state.settings.houses].map(h=>`<option ${state.filterHouse===h?'selected':''}>${h}</option>`).join('')}</select></div><div class="filter-item"><span class="filter-label">Status</span><select class="form-input" style="width: auto; padding: 6px 10px; font-size: 12px;" onchange="state.filterStatus=this.value; render()">${['Todos',...state.settings.statuses].map(s=>`<option ${state.filterStatus===s?'selected':''}>${s}</option>`).join('')}</select></div><span style="font-size: 12px; color: #484f58; margin-left: auto;">${fb.length} apostas</span></div>`:''}${state.bets.length===0?`<div style="text-align: center; padding: 80px 20px;"><div style="font-size: 64px; margin-bottom: 16px;">🎲</div><p style="color: #8b949e;">Nenhuma aposta registrada</p></div>`:`<div class="card" style="overflow: auto; padding: 0;"><table><thead><tr><th>Data</th><th>Descrição</th><th>Esporte</th><th>Casa</th><th>Odd</th><th>Stake</th><th>Status</th><th>Resultado</th><th></th></tr></thead><tbody>${fb.sort((a,b)=>b.date.localeCompare(a.date)).map(b=>`<tr><td style="color: #8b949e;">${b.date}</td><td><div class="bet-description" title="${b.descricao||'-'}">${b.descricao||'-'}</div></td><td>${b.sport}</td><td style="color: #8b949e;">${b.house}</td><td>${b.odd}</td><td>R$ ${b.stake.toFixed(2)}</td><td><span class="badge" style="background: ${STATUS_COLORS[b.status]}18; color: ${STATUS_COLORS[b.status]}; border: 1px solid ${STATUS_COLORS[b.status]}40;">${b.status}</span></td><td style="color: ${b.resultado===null?'#484f58':b.resultado>=0?'#00e5a0':'#ff4757'}; font-weight: 500;">${b.resultado===null?'—':`${b.resultado>=0?'+':''}R$ ${b.resultado.toFixed(2)}`}</td><td><button class="btn btn-small" onclick='handleEdit(${JSON.stringify(b).replace(/'/g,"\\\\'")})'>Editar</button><button class="btn btn-danger btn-small" onclick="handleDelete(${b.id})">✕</button></td></tr>`).join('')}</tbody></table></div>`}`;}
function renderNovaAposta(){const p=state.form.odd&&state.form.stake&&state.form.status!=="Pendente"&&state.form.status!=="Cashout"?(()=>{const o=parseFloat(state.form.odd),s=parseFloat(state.form.stake);if(state.form.status==="Ganha")return`+R$ ${((o-1)*s).toFixed(2)}`;if(state.form.status==="Perdida")return`-R$ ${s.toFixed(2)}`;if(state.form.status==="Reembolsada")return"R$ 0,00";if(state.form.status==="Meio-ganha")return`+R$ ${((o-1)*s/2).toFixed(2)}`;if(state.form.status==="Meio-perdida")return`-R$ ${(s/2).toFixed(2)}`;return"—";})():null;const c=state.form.status==="Cashout"&&state.form.resultado&&state.form.stake?(()=>{const v=parseFloat(state.form.resultado),s=parseFloat(state.form.stake),p=v-s;return{value:v,profit:p};})():null;return`<h1 style="margin-bottom: 24px;">${state.editId?'Editar':'Nova'} Aposta</h1><form class="card" onsubmit="handleSubmit(event); return false;" style="max-width: 680px;"><div class="form-group"><label>📝 Descrição</label><textarea class="form-input" id="desc-input" placeholder="Ex: Lakers ML">${state.form.descricao}</textarea></div><div class="form-grid"><div class="form-group"><label>📅 Data *</label><input type="date" class="form-input" id="date-input" value="${state.form.date}" required></div><div class="form-group"><label>Odd *</label><input type="number" step="0.01" class="form-input" id="odd-input" placeholder="1.85" value="${state.form.odd}" required></div><div class="form-group"><label>Stake (R$) *</label><input type="number" step="0.01" class="form-input" id="stake-input" placeholder="100" value="${state.form.stake}" required></div><div class="form-group"><label>Esporte</label><select class="form-input" id="sport-select">${state.settings.sports.map(s=>`<option ${state.form.sport===s?'selected':''}>${s}</option>`).join('')}</select></div><div class="form-group"><label>Casa</label><select class="form-input" id="house-select">${state.settings.houses.map(h=>`<option ${state.form.house===h?'selected':''}>${h}</option>`).join('')}</select></div><div class="form-group"><label>Modalidade</label><select class="form-input" id="modal-select">${state.settings.modalidades.map(m=>`<option ${state.form.modalidade===m?'selected':''}>${m}</option>`).join('')}</select></div><div class="form-group"><label>Status</label><select class="form-input" id="status-select">${state.settings.statuses.map(s=>`<option ${state.form.status===s?'selected':''}>${s}</option>`).join('')}</select></div></div>${state.form.status==="Pendente"||state.form.status==="Cashout"?`<div class="form-group"><label>${state.form.status==="Cashout"?"💰 Valor Recebido (R$) *":"Resultado Manual"}</label><input type="number" step="0.01" class="form-input" id="result-input" placeholder="${state.form.status==="Cashout"?"150":"Opcional"}" value="${state.form.resultado}" ${state.form.status==="Cashout"?"required":""}>${state.form.status==="Cashout"?'<p class="form-hint">⚠️ Informe o valor total recebido</p>':''}</div>`:''}${p?`<div style="padding: 14px; background: #161b22; border-radius: 8px; margin-top: 16px;"><span style="color: #8b949e;">Resultado: </span><strong style="color: ${p.startsWith('+')?'#00e5a0':'#ff4757'};">${p}</strong></div>`:''}${c?`<div style="padding: 14px; background: #161b22; border-radius: 8px; margin-top: 16px;"><div style="display: flex; justify-content: space-between; margin-bottom: 4px;"><span style="color: #8b949e;">Apostado:</span><span>R$ ${parseFloat(state.form.stake).toFixed(2)}</span></div><div style="display: flex; justify-content: space-between; margin-bottom: 4px;"><span style="color: #8b949e;">Cashout:</span><span style="color: #c77dff;">R$ ${c.value.toFixed(2)}</span></div><div style="border-top: 1px solid #30363d; margin: 8px 0; padding-top: 8px; display: flex; justify-content: space-between;"><span style="color: #8b949e;">Lucro:</span><strong style="color: ${c.profit>=0?'#00e5a0':'#ff4757'};">${c.profit>=0?'+':''}R$ ${c.profit.toFixed(2)}</strong></div></div>`:''}<div style="display: flex; gap: 10px; margin-top: 24px;"><button type="submit" class="btn btn-primary">✓ ${state.editId?'Salvar':'Registrar'}</button><button type="button" class="btn" onclick="state.view='apostas'; state.editId=null; state.form={date:'',sport:state.settings.sports[0],house:state.settings.houses[0],odd:'',stake:'',modalidade:state.settings.modalidades[0],status:'Pendente',resultado:'',descricao:''}; render()">Cancelar</button></div></form>`;}
function renderConfig(){return`<h1>Configurações</h1><div class="settings-grid" style="margin-top: 32px;"><div class="card"><h2>💰 Banca Inicial</h2><p style="font-size: 12px; color: #8b949e; margin-bottom: 16px;">Valor atual: <strong style="color: #00e5a0;">R$ ${state.settings.initialBank.toFixed(2)}</strong></p><div class="alert">⚠️ Alterar afeta todos os cálculos</div><div class="input-group"><div class="form-group" style="flex: 1; margin: 0;"><label>Novo valor (R$)</label><input type="number" step="0.01" class="form-input" id="bank-input" placeholder="1000" value="${state.settingsForm.initialBank}"></div><button class="btn btn-primary" onclick="updateInitialBank()" style="height: 38px; align-self: flex-end;">Atualizar</button></div></div><div class="card"><h2>📊 Valor da Unidade</h2><p style="font-size: 12px; color: #8b949e; margin-bottom: 16px;">Valor atual: <strong style="color: #00e5a0;">1U = R$ ${state.settings.unitValue.toFixed(2)}</strong></p><div class="input-group"><div class="form-group" style="flex: 1; margin: 0;"><label>Valor de 1U (R$)</label><input type="number" step="0.01" class="form-input" id="unit-input" placeholder="100" value="${state.settingsForm.unitValue}"></div><button class="btn btn-primary" onclick="updateUnitValue()" style="height: 38px; align-self: flex-end;">Atualizar</button></div></div><div class="card"><h2>⚽ Esportes</h2><div class="input-group"><div class="form-group" style="flex: 1; margin: 0;"><label>Adicionar</label><input type="text" class="form-input" id="sport-add" placeholder="Vôlei" value="${state.settingsForm.newSport}"></div><button class="btn btn-primary" onclick="addSport()" style="height: 38px; align-self: flex-end;">+ Add</button></div><div class="tag-list">${state.settings.sports.map(s=>`<div class="tag"><span>${s}</span><span class="tag-remove" onclick="removeSport('${s}')">×</span></div>`).join('')}</div></div><div class="card"><h2>🏠 Casas</h2><div class="input-group"><div class="form-group" style="flex: 1; margin: 0;"><label>Adicionar</label><input type="text" class="form-input" id="house-add" placeholder="Stake" value="${state.settingsForm.newHouse}"></div><button class="btn btn-primary" onclick="addHouse()" style="height: 38px; align-self: flex-end;">+ Add</button></div><div class="tag-list">${state.settings.houses.map(h=>`<div class="tag"><span>${h}</span><span class="tag-remove" onclick="removeHouse('${h}')">×</span></div>`).join('')}</div></div><div class="card"><h2>📋 Modalidades</h2><div class="input-group"><div class="form-group" style="flex: 1; margin: 0;"><label>Adicionar</label><input type="text" class="form-input" id="modal-add" placeholder="Sistema" value="${state.settingsForm.newModalidade}"></div><button class="btn btn-primary" onclick="addModalidade()" style="height: 38px; align-self: flex-end;">+ Add</button></div><div class="tag-list">${state.settings.modalidades.map(m=>`<div class="tag"><span>${m}</span><span class="tag-remove" onclick="removeModalidade('${m}')">×</span></div>`).join('')}</div></div></div><div class="card" style="margin-top: 24px; border-color: #ff475740;"><h2 style="color: #ff4757;">🔄 Resetar Configurações</h2><button class="btn btn-danger" onclick="handleResetSettings()">Resetar para Padrão</button></div>`;}

function attachFormListeners(){if(state.view==='nova'){const d=document.getElementById('desc-input'),dt=document.getElementById('date-input'),o=document.getElementById('odd-input'),s=document.getElementById('stake-input'),sp=document.getElementById('sport-select'),h=document.getElementById('house-select'),m=document.getElementById('modal-select'),st=document.getElementById('status-select'),r=document.getElementById('result-input');if(d)d.oninput=e=>state.form.descricao=e.target.value;if(dt)dt.onchange=e=>{state.form.date=e.target.value;render();};if(o){o.oninput=e=>state.form.odd=e.target.value;o.onblur=()=>render();}if(s){s.oninput=e=>state.form.stake=e.target.value;s.onblur=()=>render();}if(sp)sp.onchange=e=>state.form.sport=e.target.value;if(h)h.onchange=e=>state.form.house=e.target.value;if(m)m.onchange=e=>state.form.modalidade=e.target.value;if(st)st.onchange=e=>{state.form.status=e.target.value;render();};if(r){r.oninput=e=>state.form.resultado=e.target.value;r.onblur=()=>render();}}if(state.view==='config'){const b=document.getElementById('bank-input'),u=document.getElementById('unit-input'),sa=document.getElementById('sport-add'),ha=document.getElementById('house-add'),ma=document.getElementById('modal-add');if(b)b.oninput=e=>state.settingsForm.initialBank=e.target.value;if(u)u.oninput=e=>state.settingsForm.unitValue=e.target.value;if(sa)sa.oninput=e=>state.settingsForm.newSport=e.target.value;if(ha)ha.oninput=e=>state.settingsForm.newHouse=e.target.value;if(ma)ma.oninput=e=>state.settingsForm.newModalidade=e.target.value;}}

loadFromStorage();
render();
attachFormListeners();
const observer=new MutationObserver(()=>attachFormListeners());
observer.observe(document.getElementById('app'),{childList:true,subtree:true});
console.log("EdgeBets v4 - Backup/Restore ativado!");
  </script>
</body>
</html>
